# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: mazzite
description: |-
  Mazzite — Bazzite-NVIDIA + MangoWM + Noctalia v5 (git)
  A custom Universal Blue image based on bazzite-nvidia:stable with the
  MangoWM Wayland tiling compositor and Noctalia v5 desktop shell added
  as an additional session in SDDM.
base-image: ghcr.io/ublue-os/bazzite-nvidia
image-version: stable

# image-version alternatives:
#   - "stable"        -> always builds from latest stable tag
#   - "44"            -> pin to Fedora 44 base
#   - "latest"        -> tracks latest tag
#
# We use "stable" so the image rebuilds on every new Bazzite release
# without us having to bump the version here.

# Only build for x86_64 — bazzite-nvidia does not ship ARM images.
platforms:
  - linux/amd64

# Custom image labels (appear in `skopeo inspect` / podman metadata).
labels:
  org.opencontainers.image.title: mazzite
  org.opencontainers.image.description: Bazzite-NVIDIA + MangoWM + Noctalia v5
  org.opencontainers.image.source: https://github.com/PatrikHallgren/Mazzite
  org.opencontainers.image.licenses: MIT
  io.ublue.os.family: bazzite
  io.ublue.os.version: mazzite-1

modules:
  # ---------------------------------------------------------------------------
  # 1. Install MangoWM and Noctalia-git from Terra + COPR.
  #
  # Notes:
  #   - bazzite-nvidia:stable ships with the Terra repository already enabled
  #     (the `terra-release*` packages are installed in the base image build),
  #     so we can `dnf5 install mangowm` directly. MangoWM's runtime deps
  #     (wlroots, scenefx, wayland, libinput, libxkbcommon, etc.) are pulled
  #     in automatically.
  #   - Noctalia v5 git is in the lionheartp/Hyprland COPR for F44. We pin
  #     to F44 in the URL via the %OS_VERSION% magic string BlueBuild expands.
  #   - We DO NOT touch any nvidia-* / libnvidia-egl-* / libva-nvidia-driver
  #     packages; the Bazzite nvidia EGL sidecar must stay intact for Mango
  #     to be able to bind an EGL context at runtime.
  # ---------------------------------------------------------------------------
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-%OS_VERSION%/lionheartp-Hyprland-fedora-%OS_VERSION%.repo
    install:
      # MangoWM (Terra / `terra-extras`)
      - mangowm
      # Noctalia v5 git (lionheartp/Hyprland COPR)
      - noctalia-git
      # Noctalia v5 runtime: explicit deps we KNOW the COPR package expects.
      # These are present on Bazzite, but listing them as `install` makes
      # the build resilient to future Bazzite base-image changes that might
      # drop them.
      - libwebp
      - hicolor-icon-theme
      - dejavu-sans-fonts

  # ---------------------------------------------------------------------------
  # 2. Drop in MangoWM default config + the SDDM session entry + the
  #    Noctalia v5 user systemd unit.
  #
  # BlueBuild's `files` module copies a `source` directory (relative to
  # /files in this repo) to a `destination` (absolute path in the image).
  # Order doesn't matter — BlueBuild's run is content-addressable and
  # the system uses ostree commits.
  # ---------------------------------------------------------------------------
  - type: files
    files:
      # Single mapping: copies the entire files/system/* tree to /.
      # Inside files/system/ we mirror the absolute target paths, e.g.
      #   files/system/usr/share/mango/config.conf -> /usr/share/mango/config.conf
      #   files/system/usr/lib/systemd/user/noctalia.service -> /usr/lib/systemd/user/noctalia.service
      - source: system
        destination: /

  # ---------------------------------------------------------------------------
  # 3. Enable the Noctalia v5 user systemd unit for every account on the
  #    image. MangoWM has no "exec-once" hook that fires after the
  #    compositor is up, so the cleanest autostart path is a user-level
  #    systemd unit. The unit is gated on
  #    XDG_SESSION_DESKTOP=mangowm-noctalia (set by SDDM from our custom
  #    session entry) so it never fires in the default Bazzite session.
  # ---------------------------------------------------------------------------
  - type: systemd
    user:
      enabled:
        - noctalia.service

  # ---------------------------------------------------------------------------
  # 4. Signing policy for cosign image verification.
  #    On the build side, the GitHub Action handles the actual signing with
  #    SIGNING_SECRET. This module installs the *client* policy so a
  #    downstream rebase via `bootc switch` can verify our image.
  # ---------------------------------------------------------------------------
  - type: signing

  # ---------------------------------------------------------------------------
  # 5. Final cleanup: drop dnf cache, run `bootc container lint`.
  # ---------------------------------------------------------------------------
  - type: script
    snippets:
      - "dnf5 clean all"
      - "rm -rf /var/cache/{dnf,rpm-ostree,libdnf5} /var/log/dnf5.log /var/log/hawkey.log"
    scripts:
      - post-install-cleanup.sh
