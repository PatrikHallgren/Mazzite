# Mazzite — default MangoWM configuration.
# Seeded to ~/.config/mango/config.conf on first Mango session login.
# After first run, edit your own copy; the system copy at
# /usr/share/mazzite/mango.conf is the seed only.
#
# Format: key=value (flat). See /usr/share/mango/config.conf on the
# live image for the upstream defaults this file overrides.
# Reference: https://github.com/mangowm/mango

# ---------------------------------------------------------------------------
# Theme: Gruvbox dark, matching the Bazzite-flavoured background.
# ---------------------------------------------------------------------------
rootcolor=0x1d2021ff
bordercolor=0x3c3836ff
focuscolor=0xebdbb2ff
dropcolor=0x45858855
splitcolor=0xfe8019ff
urgentcolor=0xfb4934ff
scratchpadcolor=0x83a598ff
globalcolor=0xd3869bff
overlaycolor=0x8ec07cff

# Window decoration
borderpx=2
gappih=6
gappiv=6
gappoh=10
gappov=10
border_radius=6
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=0.95

# Effects (kept off to avoid GPU strain on the Mango session;
# the nvidia EGL stack does not appreciate aggressive effects).
blur=0
shadows=0
layer_shadows=0
animations=1
animation_duration_open=300
animation_duration_close=300

# ---------------------------------------------------------------------------
# Input / keyboard
# ---------------------------------------------------------------------------
repeat_rate=30
repeat_delay=400
xkb_rules_layout=us
tap_to_click=1
trackpad_natural_scrolling=0
mouse_natural_scrolling=0

# ---------------------------------------------------------------------------
# Tags: 9, each on a tile layout.
# ---------------------------------------------------------------------------
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ---------------------------------------------------------------------------
# Spawn helpers (use noctalia IPC for the launcher / controls).
# ---------------------------------------------------------------------------
bind=Alt,space,spawn,noctalia msg launcher toggle
bind=Alt,Return,spawn,ghostty
bind=SUPER,Return,spawn,ghostty
bind=SUPER,e,spawn,fuzzel

# ---------------------------------------------------------------------------
# Window control
# ---------------------------------------------------------------------------
bind=ALT,q,killclient,
bind=SUPER,q,killclient,
bind=ALT,backslash,togglefloating,
bind=SUPER,w,togglefloating,
bind=ALT,f,togglefullscreen,
bind=SUPER,f,togglefullscreen,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,n,switch_layout

# ---------------------------------------------------------------------------
# Focus direction
# ---------------------------------------------------------------------------
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down
bind=SUPER,Left,focusstack,next

# ---------------------------------------------------------------------------
# Move / resize
# ---------------------------------------------------------------------------
bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right
bind=ALT+SHIFT,Up,exchange_client,up
bind=ALT+SHIFT,Down,exchange_client,down
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# ---------------------------------------------------------------------------
# Tag switching (Super+1..9) and moving clients to tags (Super+Shift+1..9)
# ---------------------------------------------------------------------------
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ---------------------------------------------------------------------------
# Media / brightness keys -> noctalia IPC.
# Noctalia v5 implements IPC commands at /usr/bin/noctalia msg.
# ---------------------------------------------------------------------------
bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume raise
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume lower
bind=NONE,XF86AudioMute,spawn,noctalia msg volume mute
bind=NONE,XF86AudioMicMute,spawn,noctalia msg microphone mute
bind=NONE,XF86MonBrightnessUp,spawn,noctalia msg brightness raise
bind=NONE,XF86MonBrightnessDown,spawn,noctalia msg brightness lower

# ---------------------------------------------------------------------------
# Screenshot: full screen with Print, region with Super+Shift+S.
# ---------------------------------------------------------------------------
bind=NONE,Print,spawn,grim - | wl-copy
bind=SUPER+SHIFT,s,spawn,grim -g \"$(slurp)\" - | wl-copy

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,q,quit
bind=SUPER,m,quit

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ============================================================================

# ============================================================================
# Mazzite — Mango keybind supplement (Noctalia v5 tuned, verified on bazznovo)
# ============================================================================
#
# PURPOSE
#   Add Noctalia-specific keybinds to the Mazzite Mango config. The base
#   seed at /usr/share/mazzite/mango.conf is appended with this block.
#   Last-write-wins for duplicate keys, so this is safe to concatenate.
#
# IPC COMMANDS USED
#   Every `noctalia msg <cmd>` below was probed against the running
#   noctalia v5.0.0 daemon on bazznovo. Verified working top-level commands:
#       bar-toggle, bar-hide, bar-show
#       panel-toggle <id>     -- ids: launcher, control-center, clipboard,
#                                       wallpaper, session, polkit,
#                                       setup-wizard, tray-drawer, test
#       panel-open <id>
#       panel-close [id]
#       settings-open [ctx]
#       settings-close
#       settings-toggle
#       theme-mode-toggle     (NOT "dark" — that one is silently rejected)
#       theme-mode-get
#       theme-mode-set <dark|light|auto>
#       color-scheme-set <type> <name>
#       notification-dnd-toggle
#       notification-dnd-set <on|off|true|false|1|0>
#       notification-dnd-status
#       notification-show <summary> [body]
#       notification-clear-active
#       notification-clear-history
#       notification-invoke-latest
#       dpms-on, dpms-off
#       version
#   NOT registered (despite the seed's examples): "launcher", "control-center",
#   "dark", "lock-screen", "notification-history", "quit" as bare top-level
#   commands. The seed's `bind=Alt,space,spawn,noctalia msg launcher toggle`
#   is also broken in that respect — the `launcher toggle` form returns
#   "unknown command" on this build.
#
# ============================================================================

# ----------------------------------------------------------------------------
# Launchers
# ----------------------------------------------------------------------------
# Super+Space: Noctalia launcher (the canonical Mango+Noctalia shortcut).
# `panel-toggle launcher` is the real command; the seed's `launcher` form
# is rejected.
bind=SUPER,space,spawn,noctalia msg panel-toggle launcher

# Alt+Space kept for muscle memory (mirrors the seed, also broken until we
# fix it). Drop this line if you don't want the duplicate.
bind=ALT,space,spawn,noctalia msg panel-toggle launcher

# Super+Enter: terminal (already in the seed; restated for clarity)
# bind=SUPER,Return,spawn,ghostty

# Super+Shift+Enter: browser. Uses Firefox flatpak since that's installed
# on bazznovo. Edit to `brave` (or just `xdg-open`) once Brave is installed.
bind=SUPER+SHIFT,Return,spawn,flatpak run org.mozilla.firefox

# Super+slash: Control Center (right side, network/battery/audio sliders)
bind=SUPER,slash,spawn,noctalia msg panel-toggle control-center

# Super+comma: Settings
bind=SUPER,comma,spawn,noctalia msg settings-toggle

# Super+Ctrl+l: lock screen.
# noctalia v5.0.0 has no IPC for "lock now" (screensaver service is wired
# to logind idle, not direct). Use swaylock (installed by the seed) which
# runs as a lock client and respects Mango's session.
bind=SUPER+CTRL,l,spawn,swaylock -f

# Super+b: bar show/hide toggle (the one noctalia IPC that actually worked
# out of the box)
bind=SUPER,b,spawn,noctalia msg bar-toggle

# ----------------------------------------------------------------------------
# Theme / Do-Not-Disturb
# ----------------------------------------------------------------------------
# Super+d: dark mode toggle (real command is theme-mode-toggle, not "dark")
bind=SUPER,d,spawn,noctalia msg theme-mode-toggle

# Super+Shift+d: notification DND toggle
bind=SUPER+SHIFT,d,spawn,noctalia msg notification-dnd-toggle

# ----------------------------------------------------------------------------
# Window control — additions to the seed
# ----------------------------------------------------------------------------
# Super+q: close window (already in the seed as `killclient`, restated)
# bind=SUPER,q,killclient,

# Super+Shift+f: fake fullscreen (borderless, above panels, no animation).
# Distinct from Super+f (real fullscreen) in the seed.
bind=SUPER+SHIFT,f,togglefakefullscreen,

# Super+grave: show overview (exposé-style view of all windows). Useful
# when you have many tiled windows and need to find one.
bind=SUPER,grave,toggleoverview,

# ----------------------------------------------------------------------------
# Alt+Tab cycle
# ----------------------------------------------------------------------------
# Alt+Tab / Alt+Shift+Tab: cycle ALL windows
bind=ALT,Tab,focusstack,prev
bind=ALT+SHIFT,Tab,focusstack,next

# Mouse back/forward buttons as focus history (browser-style on mice)
mousebind=NONE,btn_back,focusstack,prev
mousebind=NONE,btn_forward,focusstack,next

# ----------------------------------------------------------------------------
# Drop-down terminal scratchpad
# ----------------------------------------------------------------------------
# Alt+grave (Alt+`): summon a named scratchpad running ghostty. The named
# scratchpad auto-spawns on first summon, then toggles visibility. The
# ratio options below set the floating window size.
scratchpad_width_ratio=0.6
scratchpad_height_ratio=0.5
bind=ALT,grave,toggle_named_scratchpad,ghostty,DropDown Terminal,ghostty

# ----------------------------------------------------------------------------
# Reload helpers
# ----------------------------------------------------------------------------
# Super+Shift+r: reload Mango config (in the seed already; not duplicated)

# ----------------------------------------------------------------------------
# Notes on conflicts / preferences
# ----------------------------------------------------------------------------
# Keybinds chosen for this supplement (consolidated):
#   Super+Space           Noctalia launcher
#   Super+Enter           Terminal (ghostty)
#   Super+Shift+Enter     Browser (Firefox flatpak; edit to brave/xdg-open)
#   Super+q               Close window
#   Super+slash           Control Center
#   Super+comma           Settings
#   Super+d               Dark mode
#   Super+Ctrl+l          Lock screen
#   Super+b               Bar show/hide
#   Super+Shift+d         Do-Not-Disturb
#   Super+Shift+f         Fake fullscreen
#   Super+grave           Overview (exposé)
#   Alt+Space             Noctalia launcher (duplicate, drop if you prefer)
#   Alt+grave             Drop-down terminal scratchpad
#   Alt+Tab / Shift+Tab   Cycle windows
#   Mouse back/forward    Focus history
#
# Seed conflicts that are deliberately NOT touched (seed wins by
# first-write order, or the supplement is the duplicate to drop):
#   - Seed's Super+w (togglefloating)
#   - Seed's Super+n (switch_layout)
#   - Seed's Super+Shift+s (screenshot region)
#   - Seed's Super+Shift+q / Super+m (quit)
#   - Seed's Alt+space (broken; replaced by working forms above)
#   - Seed's Alt+Return / Super+Return (terminal)
#
# ============================================================================
# To apply on bazznovo, append this file to ~/.config/mango/config.conf
# and press Super+Shift+r in your Mango session (or log out and back in).
#
# To validate without breaking the running session:
#   mango -p -c /path/to/config.conf
# ============================================================================
