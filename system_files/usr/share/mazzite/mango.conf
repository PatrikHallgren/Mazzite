# Mazzite — default MangoWM configuration.
# Seeded to ~/.config/mango/config.conf on first Mango session login.
# After first run, edit your own copy; the system copy at
# /usr/share/mazzite/mango.conf is the seed only.
#
# Format: key=value (flat). See /usr/share/mango/config.conf on the
# live image for the upstream defaults this file overrides.
# Reference: https://github.com/mangowm/mango

# ---------------------------------------------------------------------------
# Theme: Gruvbox dark, matching the Bazzite-flavoured background.
# ---------------------------------------------------------------------------
rootcolor=0x1d2021ff
bordercolor=0x3c3836ff
focuscolor=0xebdbb2ff
dropcolor=0x45858855
splitcolor=0xfe8019ff
urgentcolor=0xfb4934ff
scratchpadcolor=0x83a598ff
globalcolor=0xd3869bff
overlaycolor=0x8ec07cff

# Window decoration
borderpx=2
gappih=6
gappiv=6
gappoh=10
gappov=10
border_radius=6
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=0.95

# Effects (kept off to avoid GPU strain on the Mango session;
# the nvidia EGL stack does not appreciate aggressive effects).
blur=0
shadows=0
layer_shadows=0
animations=1
animation_duration_open=300
animation_duration_close=300

# ---------------------------------------------------------------------------
# Input / keyboard
# ---------------------------------------------------------------------------
repeat_rate=30
repeat_delay=400
xkb_rules_layout=us
tap_to_click=1
trackpad_natural_scrolling=0
mouse_natural_scrolling=0

# ---------------------------------------------------------------------------
# Tags: 9, each on a tile layout.
# ---------------------------------------------------------------------------
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ---------------------------------------------------------------------------
# Spawn helpers (use noctalia IPC for the launcher / controls).
# ---------------------------------------------------------------------------
bind=Alt,space,spawn,noctalia msg launcher toggle
bind=Alt,Return,spawn,ghostty
bind=SUPER,Return,spawn,ghostty
bind=SUPER,e,spawn,fuzzel

# ---------------------------------------------------------------------------
# Window control
# ---------------------------------------------------------------------------
bind=ALT,q,killclient,
bind=SUPER,q,killclient,
bind=ALT,backslash,togglefloating,
bind=SUPER,w,togglefloating,
bind=ALT,f,togglefullscreen,
bind=SUPER,f,togglefullscreen,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,n,switch_layout

# ---------------------------------------------------------------------------
# Focus direction
# ---------------------------------------------------------------------------
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down
bind=SUPER,Left,focusstack,next

# ---------------------------------------------------------------------------
# Move / resize
# ---------------------------------------------------------------------------
bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right
bind=ALT+SHIFT,Up,exchange_client,up
bind=ALT+SHIFT,Down,exchange_client,down
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# ---------------------------------------------------------------------------
# Tag switching (Super+1..9) and moving clients to tags (Super+Shift+1..9)
# ---------------------------------------------------------------------------
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ---------------------------------------------------------------------------
# Media / brightness keys -> noctalia IPC.
# Noctalia v5 implements IPC commands at /usr/bin/noctalia msg.
# ---------------------------------------------------------------------------
bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume raise
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume lower
bind=NONE,XF86AudioMute,spawn,noctalia msg volume mute
bind=NONE,XF86AudioMicMute,spawn,noctalia msg microphone mute
bind=NONE,XF86MonBrightnessUp,spawn,noctalia msg brightness raise
bind=NONE,XF86MonBrightnessDown,spawn,noctalia msg brightness lower

# ---------------------------------------------------------------------------
# Screenshot: full screen with Print, region with Super+Shift+S.
# ---------------------------------------------------------------------------
bind=NONE,Print,spawn,grim - | wl-copy
bind=SUPER+SHIFT,s,spawn,grim -g \"$(slurp)\" - | wl-copy

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,q,quit
bind=SUPER,m,quit

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ============================================================================
# NOCTALIA-TUNED ADDITIONS (appended by Mazzite build pipeline)
# ============================================================================
# This block extends the Mazzite seed with Noctalia v5 keybinds and a
# drop-down terminal scratchpad. Mango reads the whole file top-to-bottom
# with last-write-wins for duplicate keys. The scratchpad config options
# (scratchpad_width_ratio, scratchpad_height_ratio) are required for the
# Alt+grave scratchpad bind to do anything.
# ============================================================================
# Mazzite — Mango keybind supplement (Noctalia v5 tuned)
# ============================================================================
#
# PURPOSE
#   Add Noctalia-specific keybinds to the Mazzite Mango config, on top of
#   the seed at /usr/share/mazzite/mango.conf. Last-write-wins for duplicate
#   keys, so this is safe to append.
#
# INSTALL
#   User-only (one box, immediate effect):
#     cat this file >> ~/.config/mango/config.conf
#     press Super+Shift+r to reload Mango
#
#   System-wide (next image build):
#     save as system_files/usr/share/mazzite/mango-extras.conf in the
#     Mazzite repo, then update build_files/10-mazzite.sh to concatenate
#     this file onto mango.conf before the first-login seed step.
#
# DISPATCHES USED
#   focusstack, focusdir, exchange_client, movewin, resizewin,
#   togglefloating, togglefullscreen, togglefakefullscreen, togglemaximizescreen,
#   toggleoverview, killclient, spawn, reload_config, switch_layout,
#   view, tag, focusmon, viewnext, viewprev, focusstack
#
#   Plus toggling scratchpads (the seed's config has no scratchpad
#   settings, so a new "drop-down terminal" config block is appended
#   below the binds; otherwise the Alt+grave bind would do nothing).
#
# ============================================================================

# ----------------------------------------------------------------------------
# Noctalia control surfaces
# ----------------------------------------------------------------------------
# Launcher (MangoWM equivalent of Super+space on Plasma, Super on GNOME).
# The seed already binds Alt+space -> `noctalia msg launcher toggle`.
# Adding Super+Escape for users who don't like Alt+space.
bind=SUPER,Escape,spawn,noctalia msg launcher

# Control Center: Super+slash (between keys, low collision)
bind=SUPER,slash,spawn,noctalia msg control-center

# Settings: Super+comma (standard)
bind=SUPER,comma,spawn,noctalia msg settings

# Dark mode toggle: Super+d
bind=SUPER,d,spawn,noctalia msg dark

# Lock screen: Super+Ctrl+l
bind=SUPER+CTRL,l,spawn,noctalia msg lock-screen

# Bar visibility toggle: Super+b (handy for fullscreen video / screenshots)
bind=SUPER,b,spawn,noctalia msg bar-toggle

# Notification history: Super+Shift+n (the seed uses Super+n for switch_layout,
# so we use Super+Shift+n to avoid the conflict)
bind=SUPER+SHIFT,n,spawn,noctalia msg notification-history

# ----------------------------------------------------------------------------
# Do-Not-Disturb quick toggle
# ----------------------------------------------------------------------------
# Super+Shift+d: mutes notification popups without dismissing them.
# Useful when you want to focus for 20 minutes.
bind=SUPER+SHIFT,d,spawn,noctalia msg notification-dnd-toggle

# ----------------------------------------------------------------------------
# Window navigation — the seed has Super+Left for focusstack, add the rest
# ----------------------------------------------------------------------------
# Alt+Tab / Alt+Shift+Tab: cycle ALL windows
bind=ALT,Tab,focusstack,prev
bind=ALT+SHIFT,Tab,focusstack,next

# Mouse back/forward buttons as focus history (browser-style on mice)
mousebind=NONE,btn_back,focusstack,prev
mousebind=NONE,btn_forward,focusstack,next

# ----------------------------------------------------------------------------
# Window control — additions to the seed
# ----------------------------------------------------------------------------
# Super+Shift+f: fake fullscreen (borderless, above panels, no animation).
# Distinct from Super+f (real fullscreen) in the seed.
bind=SUPER+SHIFT,f,togglefakefullscreen,

# Super+grave: show overview (exposé-style view of all windows). Useful
# when you have many tiled windows and need to find one.
bind=SUPER,grave,toggleoverview,

# ----------------------------------------------------------------------------
# Reload / restart helpers
# ----------------------------------------------------------------------------
# Super+Shift+r: reload Mango config (also in the seed; kept here for
# the case where this is the only file loaded)
bind=SUPER+SHIFT,r,reload_config

# ============================================================================
# Scratchpad / drop-down terminal
# ============================================================================
# Mango's scratchpad support requires a *named* scratchpad to be configured
# in this same file. Without these options, the toggle_scratchpad bind does
# nothing.

# Scratchpad dimensions: how big the floating window is when summoned.
scratchpad_width_ratio=0.6
scratchpad_height_ratio=0.5

# Auto-center the scratchpad on the active monitor when shown
# (Mango does not have explicit center config; float + re-centering happens
#  via the spawn+center pipeline; for now we just rely on the ratio above).

# Bind Alt+grave to summon a drop-down ghostty terminal as a NAMED scratchpad.
# Mango's toggle_named_scratchpad dispatch takes 3 args: appid, title, cmd.
# When the scratchpad instance doesn't exist, it spawns `cmd`. When it does,
# it toggles visibility. This is the standard "drop-down terminal" pattern
# (à la i3, sway, Hyprland).
bind=ALT,grave,toggle_named_scratchpad,ghostty,DropDown Terminal,ghostty

# ----------------------------------------------------------------------------
# Notes on conflicts with the existing seed
# ----------------------------------------------------------------------------
# Seed's Alt+space = noctalia msg launcher toggle
# Supplement's Super+Escape = noctalia msg launcher
#   Two ways to do the same thing. Keep both; Alt+space is closer to
#   macOS/KDE, Super+Escape is closer to GNOME/i3.
#
# Seed's Super+n = switch_layout (cycle through tile/dwindle/scroller)
# Supplement's Super+Shift+n = notification-history
#   No conflict (different modifiers).
#
# Seed's Super+w = togglefloating
#   Untouched by this supplement.
#
# Seed's Super+f = togglefullscreen
# Supplement's Super+Shift+f = togglefakefullscreen
#   Distinct: real vs fake fullscreen. Keep both.
#
# Seed's Super+Shift+s = screenshot region (grim + slurp)
# Supplement's Super+grave = toggleoverview
#   No conflict (different keys).
#
# Seed's Super+Shift+q = quit, Super+m = quit
#   Untouched.
#
# ============================================================================
#
