# Mazzite — default MangoWM configuration.
# Seeded to ~/.config/mango/config.conf on first Mango session login.
# After first run, edit your own copy; the system copy at
# /usr/share/mazzite/mango.conf is the seed only.
#
# Format: key=value (flat). See /usr/share/mango/config.conf on the
# live image for the upstream defaults this file overrides.
# Reference: https://github.com/mangowm/mango

# ---------------------------------------------------------------------------
# Theme: Gruvbox dark, matching the Bazzite-flavoured background.
# ---------------------------------------------------------------------------
rootcolor=0x1d2021ff
bordercolor=0x3c3836ff
focuscolor=0xebdbb2ff
dropcolor=0x45858855
splitcolor=0xfe8019ff
urgentcolor=0xfb4934ff
scratchpadcolor=0x83a598ff
globalcolor=0xd3869bff
overlaycolor=0x8ec07cff

# Window decoration
borderpx=2
gappih=6
gappiv=6
gappoh=10
gappov=10
border_radius=6
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=0.95

# Effects (kept off to avoid GPU strain on the Mango session;
# the nvidia EGL stack does not appreciate aggressive effects).
blur=0
shadows=0
layer_shadows=0
animations=1
animation_duration_open=300
animation_duration_close=300

# ---------------------------------------------------------------------------
# Input / keyboard
# ---------------------------------------------------------------------------
repeat_rate=30
repeat_delay=400
xkb_rules_layout=us
tap_to_click=1
trackpad_natural_scrolling=0
mouse_natural_scrolling=0

# ---------------------------------------------------------------------------
# Tags: 9, each on a tile layout.
# ---------------------------------------------------------------------------
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ---------------------------------------------------------------------------
# Spawn helpers (use noctalia IPC for the launcher / controls).
# ---------------------------------------------------------------------------
bind=Alt,space,spawn,noctalia msg launcher toggle
bind=Alt,Return,spawn,ghostty
bind=SUPER,Return,spawn,ghostty
bind=SUPER,e,spawn,fuzzel

# ---------------------------------------------------------------------------
# Window control
# ---------------------------------------------------------------------------
bind=ALT,q,killclient,
bind=SUPER,q,killclient,
bind=ALT,backslash,togglefloating,
bind=SUPER,w,togglefloating,
bind=ALT,f,togglefullscreen,
bind=SUPER,f,togglefullscreen,
bind=ALT,a,togglemaximizescreen,
bind=SUPER,n,switch_layout

# ---------------------------------------------------------------------------
# Focus direction
# ---------------------------------------------------------------------------
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down
bind=SUPER,Left,focusstack,next

# ---------------------------------------------------------------------------
# Move / resize
# ---------------------------------------------------------------------------
bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right
bind=ALT+SHIFT,Up,exchange_client,up
bind=ALT+SHIFT,Down,exchange_client,down
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# ---------------------------------------------------------------------------
# Tag switching (Super+1..9) and moving clients to tags (Super+Shift+1..9)
# ---------------------------------------------------------------------------
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ---------------------------------------------------------------------------
# Media / brightness keys -> noctalia IPC.
# Noctalia v5 implements IPC commands at /usr/bin/noctalia msg.
# ---------------------------------------------------------------------------
bind=,XF86AudioRaiseVolume,spawn,noctalia msg volume raise
bind=,XF86AudioLowerVolume,spawn,noctalia msg volume lower
bind=,XF86AudioMute,spawn,noctalia msg volume mute
bind=,XF86AudioMicMute,spawn,noctalia msg microphone mute
bind=,XF86MonBrightnessUp,spawn,noctalia msg brightness raise
bind=,XF86MonBrightnessDown,spawn,noctalia msg brightness lower

# ---------------------------------------------------------------------------
# Screenshot: full screen with Print, region with Super+Shift+S.
# ---------------------------------------------------------------------------
bind=,Print,spawn,grim - | wl-copy
bind=SUPER+SHIFT,s,spawn,grim -g \"$(slurp)\" - | wl-copy

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,q,quit
bind=SUPER,m,quit

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0
