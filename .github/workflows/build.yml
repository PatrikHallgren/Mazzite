name: build

# Trigger the build on push to main, on PRs (validation), manually via
# workflow_dispatch, and on a daily cron at 10:30 UTC so the image
# picks up Bazzite base updates even when no commit has landed.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & sign (${{ matrix.recipe }})
    runs-on: ubuntu-24.04

    # GITHUB_TOKEN needs packages:write to push the built image to GHCR.
    # Without this, the final `bootc push` step fails with a 403.
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        # One job per recipe in /recipes. We start with just `recipe.yml`
        # but this makes it trivial to add stable-nvidia or nvidia-open
        # variants later by adding a second recipe file.
        recipe:
          - recipe.yml

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Free up build-host space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc \
                      /usr/lib/dotnet /opt/microsoft /opt/mssql-tools

      # Log in to ghcr.io BEFORE the BlueBuild action. The bluebuild CLI
      # reads its registry credentials from the Docker credential store
      # first, then falls back to GITHUB_ACTOR + GITHUB_TOKEN if no Docker
      # creds are present. The GITHUB_TOKEN fallback uses PatrikHallgren
      # which has no read:packages access on the ublue-os org's images
      # (bazzite-nvidia, etc.), so the source pull fails with
      # "Not authorized". Logging in via docker/login-action first stores
      # creds in ~/.docker/config.json, which the bluebuild CLI then
      # picks up — and the GITHUB_TOKEN is sufficient to read public
      # images once the CLI uses it.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with BlueBuild
        uses: blue-build/github-action@v1
        with:
          # The `recipe:` input is RELATIVE to the `recipes/` directory.
          # The action internally prepends `recipes/` to whatever you pass.
          # Pass just the filename so the resolved path is `recipes/recipe.yml`.
          # The cosign public key is expected to be at the repo root as
          # `cosign.pub` (we ship it for verifier convenience).
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          # Push to GHCR on main + schedule; dry-run on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          registry: ghcr.io
          registry_namespace: ${{ github.repository_owner }}
          # PR context (required by the action even on push).
          pr_event_number: ${{ github.event.pull_request.number || 0 }}
          # Maximise free disk on the runner before build.
          maximize_build_space: true
