name: Build Mazzite image

# Build on push to main, on PRs (validation), manually, and on a daily
# cron at 10:30 UTC so the image picks up Bazzite base updates even
# when no commit has landed.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

jobs:
  build_push:
    name: Build ${{ matrix.variant.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # Start with just one variant: bazzite-nvidia:stable.
        # Add stable-nvidia (for bazzite-dx-nvidia) or others later
        # by appending to this list.
        variant:
          - name: stable
            base_image: ghcr.io/ublue-os/bazzite-nvidia:stable

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="${IMAGE_REGISTRY,,}"
          NAME="mazzite"
          VARIANT="${{ matrix.variant.name }}"
          DATE_TAG="${VARIANT}-$(date -u +%Y%m%d)"

          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${NAME}" >> $GITHUB_ENV
          echo "VARIANT=${VARIANT}" >> $GITHUB_ENV
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV

      - name: Build image
        id: build
        run: |
          sudo podman build \
            --build-arg BASE_IMAGE=${{ matrix.variant.base_image }} \
            --label="containers.bootc=1" \
            -t ${IMAGE_NAME}:${VARIANT} \
            .

      # Rechunk for smaller delta updates. Best-effort — rechunking is
      # still being upstreamed in Bluefin/Bazzite and may fail on some
      # versions. continue-on-error so a failed rechunk doesn't fail
      # the whole build.
      - name: Rechunk with rpm-ostree
        id: rechunk
        continue-on-error: true
        run: |
          sudo dnf install -y rpm-ostree
          sudo rpm-ostree cli rechunk ${IMAGE_NAME}:${VARIANT}

      - name: Tag image
        id: tag
        run: |
          sudo podman tag ${IMAGE_NAME}:${VARIANT} ${IMAGE_NAME}:${DATE_TAG}
          if [ "${VARIANT}" = "stable" ]; then
            sudo podman tag ${IMAGE_NAME}:${VARIANT} ${IMAGE_NAME}:latest
          fi

      # Log in to GHCR. Only on main + schedule; PRs do a dry run.
      # Two steps: docker/login-action (for buildah/scosign) AND a
      # separate podman login (for the push step which uses sudo).
      # The Docker login stores creds in $HOME/.docker/config.json;
      # podman running under sudo doesn't see that, so we pipe the
      # token to podman login directly.
      - name: Log in to GitHub Container Registry (docker)
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Podman login to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      # Cosign key + password are required to sign the image. The
      # SIGNING_SECRET is the contents of cosign.key (a sigstore
      # private key), not a base64-encoded version.
      - name: Install cosign
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Import cosign private key
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          mkdir -p ~/.local/share/cosign
          echo "${{ secrets.SIGNING_SECRET }}" > ~/.local/share/cosign/cosign.key
          chmod 600 ~/.local/share/cosign/cosign.key

      # Push image (plain podman push, no GPG signing).
      # We do cosign signing as a separate step below.
      - name: Push image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push-image
        run: |
          set -euxo pipefail

          # Push variant tag
          sudo podman push --digestfile=/tmp/digestfile \
            ${IMAGE_NAME}:${VARIANT} \
            ${REGISTRY}/${IMAGE_NAME}:${VARIANT}
          DIGEST=$(cat /tmp/digestfile)

          # Push date tag
          sudo podman push \
            ${IMAGE_NAME}:${DATE_TAG} \
            ${REGISTRY}/${IMAGE_NAME}:${DATE_TAG}

          # Also push `latest` for the stable variant
          if [ "${VARIANT}" = "stable" ]; then
            sudo podman push \
              ${IMAGE_NAME}:latest \
              ${REGISTRY}/${IMAGE_NAME}:latest
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # Cosign sign. The key is passed as an env var to keep it out
      # of the filesystem. COSIGN_PASSWORD is empty (the key was
      # generated with an empty passphrase, matching the UBlueOS key).
      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: "false"
          COSIGN_PASSWORD: ""
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign -y \
            --key env://COSIGN_PRIVATE_KEY \
            ${REGISTRY}/${IMAGE_NAME}@${{ steps.push-image.outputs.digest }}
