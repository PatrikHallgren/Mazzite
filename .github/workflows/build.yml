name: build

# Trigger the build on push to main, on PRs (validation), manually via
# workflow_dispatch, and on a daily cron at 10:30 UTC so the image
# picks up Bazzite base updates even when no commit has landed.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & sign (${{ matrix.recipe }})
    runs-on: ubuntu-24.04

    # GITHUB_TOKEN needs packages:write to push the built image to GHCR.
    # Without this, the final `bootc push` step fails with a 403.
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        # One job per recipe in /recipes. We start with just `recipe.yml`
        # but this makes it trivial to add stable-nvidia or nvidia-open
        # variants later by adding a second recipe file.
        recipe:
          - recipe.yml

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Free up build-host space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc \
                      /usr/lib/dotnet /opt/microsoft /opt/mssql-tools

      # The bluebuild CLI's source-pull auth is the root cause of the
      # "Not authorized" failures. The CLI's credentials.rs init() function
      # auto-picks GITHUB_ACTOR + GITHUB_TOKEN as fallback creds for the
      # ghcr.io source pull. GITHUB_TOKEN is scoped to the current repo's
      # org, so it CANNOT read packages in ublue-os (e.g. bazzite-nvidia),
      # and the OCI client sends a malformed Basic-auth header that
      # triggers a 401.
      #
      # We work around this by:
      #   1. Unsetting GITHUB_ACTIONS / GITHUB_ACTOR / GITHUB_TOKEN in the
      #      runner env before the BlueBuild step, so init() returns
      #      without storing any creds. The OCI client then uses
      #      RegistryAuth::Anonymous, and the public bazzite-nvidia image
      #      pulls successfully.
      #   2. NOT passing registry_token to the BlueBuild action (defaults
      #      to ""), so BB_USERNAME / BB_PASSWORD stay empty and the
      #      action's first-match branch also fails to store creds.
      #   3. Running docker/login-action before the build so the runner
      #      has valid creds for the DESTINATION push (ghcr.io/PatrikHallgren).
      #      The destination push goes through buildah/bootc which reads
      #      ~/.docker/config.json — separate from the OCI client path.
      - name: Disable GITHUB_ACTIONS auto-auth for source pull
        run: |
          echo "GITHUB_ACTIONS=" >> "$GITHUB_ENV"
          echo "GITHUB_ACTOR=" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=" >> "$GITHUB_ENV"
        shell: bash

      - name: Log in to GitHub Container Registry (destination push auth)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with BlueBuild
        uses: blue-build/github-action@v1
        with:
          # The `recipe:` input is RELATIVE to the `recipes/` directory.
          # The action internally prepends `recipes/` to whatever you pass.
          # Pass just the filename so the resolved path is `recipes/recipe.yml`.
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          # Push to GHCR on main + schedule; dry-run on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          registry: ghcr.io
          registry_namespace: ${{ github.repository_owner }}
          # NB: do NOT set `registry_token` here. We want the source pull
          # to use RegistryAuth::Anonymous (via the env unset above), not
          # Basic auth. The destination push uses Docker creds from the
          # docker/login-action step instead.
          # PR context (required by the action even on push).
          pr_event_number: ${{ github.event.pull_request.number || 0 }}
          # Maximise free disk on the runner before build.
          maximize_build_space: true
